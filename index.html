<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AiR | Chicago</title>
    <style>
      :root {
        font-family:
          Big Shoulders,
          Helvetica,
          Arial,
          sans-serif;
        line-height: 1.5;
        font-weight: 400;
        color-scheme: light;
        font-variant-ligatures: discretionary-ligatures;
      }

      html {
        box-sizing: border-box;
        max-width: 100vw;
        max-height: 100vh;
      }

      body {
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        width: 100vw;
        height: 100vh;
        overflow: hidden;

        background-color: white;
        color: black;
        margin: 0;
      }

      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        box-sizing: border-box;
      }

      div {
        box-sizing: border-box;
      }

      h3 {
        margin: 0;
      }

      h1,
      h2,
      h3,
      h4,
      p,
      a {
        font-variant-ligatures: discretionary-ligatures;
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Font as defined by https://design.chicago.gov/typography/ -->
    <link
      href="https://fonts.googleapis.com/css2?family=Big+Shoulders:opsz,wght@10..72,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div
      id="root"
      style="display: flex; flex-direction: column; width: 100vw; height: 100vh"
    ></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
